<!-- doctype -->
<!doctype html>

<!-- html -->
<html lang="en">
  <head>
    <!-- meta -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- title -->
    <title>Shruthi Bhatt Portfolio</title>

    <!-- favicon -->
    <link rel="icon" type="image/x-icon" href="favicon.ico" />

    <!-- font awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <!-- css -->
    <link href="index.css" rel="stylesheet" />
  </head>

  <!-- body -->
  <body class="body">
    <!-- container for margin -->
    <div class="container">
      <section class="container__top-section">
        <!-- header -->
        <header class="header">
          <!-- email desktop -->
          <a
            href="mailto:shruthi.bhatt@siriuscom.com"
            class="header__email-desktop"
            >shruthi.bhatt@siriuscom.com</a
          >
        </header>

        <!-- hero -->
        <section class="hero">
          <!-- hero heading -->
          <h1 class="hero__heading">Shruthi <span>Bhatt</span></h1>

          <!-- hero subheading -->
          <h2 class="hero__subheading">a <span>product</span> designer</h2>
        </section>
      </section>

      <!-- showcase -->
      <section class="showcase">
        <!-- images in showcase -->
        <figure class="showcase__img-container">
          <img
            src="assets/products/rawpixel.png"
            alt="rawpixel"
            class="showcase__img"
          />
        </figure>

        <figure class="showcase__img-container">
          <img
            src="assets/products/fancycrave.png"
            alt="fancycrave"
            class="showcase__img"
          />
        </figure>

        <figure class="showcase__img-container">
          <img
            src="assets/products/nadine-shaabana.png"
            alt="nadine-shaabana"
            class="showcase__img"
          />
        </figure>

        <figure class="showcase__img-container">
          <img
            src="assets/products/fikri-rasyid.png"
            alt="fikri-rasyid"
            class="showcase__img"
          />
        </figure>

        <figure class="showcase__img-container">
          <img
            src="assets/products/marc-mueller.png"
            alt="marc-mueller"
            class="showcase__img"
          />
        </figure>

        <figure class="showcase__img-container">
          <img
            src="assets/products/jeff-sheldon.png"
            alt="jeff-sheldon"
            class="showcase__img"
          />
        </figure>
      </section>

      <!-- big names -->
      <section class="bigNames">
        <h2 class="bigNames__heading">
          Big names to
          <span class="bigNames__heading-highlight"> show off </span>
        </h2>

        <div class="bigNames__img-container">
          <a
            href="https://open.spotify.com"
            target="_blank"
            class="bigName__img-link"
          >
            <img
              src="assets/logos/spotify.png"
              alt="spotify logo"
              class="bigNames__img bigNames__img-spotify"
            />
          </a>

          <a
            href="https://www.audi.in/en/models/?channelId=2989&utm_source=Search&utm_medium=AllModels&utm_term=Mixed&utm_content=P1+P2&utm_campaign=20176349_PHD_Audi_India_Always_On_Performance_Campaign_Search_AllModels_P1+P2&gad_source=1&gad_campaignid=22428945094&gclid=Cj0KCQjwp7jOBhDGARIsABe7C4dE1Wp2NjKQixcV-dnU-apr7mZNtaW1XdbQC-V8Cq6pFxZWIzk5tb4aAqABEALw_wcB"
            target="_blank"
            class="bigName__img-link"
          >
            <img
              src="assets/logos/audi.png"
              alt="audi logo"
              class="bigNames__img bigNames__img-audi"
            />
          </a>

          <a
            href="https://www.adidas.co.in"
            target="_blank"
            class="bigName__img-link"
          >
            <img
              src="assets/logos/adidas.png"
              alt="adidas logo"
              class="bigNames__img bigNames__img-adidas"
            />
          </a>

          <a
            href="https://www.lufthansa.com/in/en/homepage"
            target="_blank"
            class="bigName__img-link"
          >
            <img
              src="assets/logos/lufthansa.png"
              alt="lufthansa logo"
              class="bigNames__img bigNames__img-lufthansa"
            />
          </a>

          <a
            href="https://www.ikea.com/in/en/?gad_source=1&gad_campaignid=23478760782&gclid=Cj0KCQjwp7jOBhDGARIsABe7C4eUy9L4x78q9DbnvdEeK9LHyI0fXyltzEP7Y1S3PSPNthWn9cR-Y2QaAr-bEALw_wcB"
            target="_blank"
            class="bigName__img-link"
          >
            <img
              src="assets/logos/ikea.png"
              alt="ikea logo"
              class="bigNames__img bigNames__img-ikea"
            />
          </a>

          <a
            href="https://www.montblanc.com/en-us"
            target="_blank"
            class="bigName__img-link"
          >
            <img
              src="assets/logos/mont-blanc.png"
              alt="mont blanc logo"
              class="bigNames__img bigNames__img-mont-blanc"
            />
          </a>
        </div>
      </section>

      <!-- footer divider  -->
      <section class="footer__divider"></section>

      <!-- footer -->
      <footer class="footer">
        <section class="footer__social-icons">
          <button type="button" class="footer__social-icons-btn">
            <a
              href="https://www.facebook.com"
              class="footer__social-link"
              target="_blank"
            >
              <i class="fa-brands fa-facebook-f"></i>
            </a>
          </button>

          <button type="button" class="footer__social-icons-btn">
            <a
              href="https://x.com/?lang=en"
              class="footer__social-link"
              target="_blank"
            >
              <i class="fa-brands fa-twitter"></i>
            </a>
          </button>

          <button type="button" class="footer__social-icons-btn">
            <a
              href="https://www.instagram.com/?hl=en"
              class="footer__social-link"
              target="_blank"
            >
              <i class="fa-brands fa-instagram"></i>
            </a>
          </button>

          <button type="button" class="footer__social-icons-btn">
            <a
              href="https://dribbble.com/"
              class="footer__social-link"
              target="_blank"
            >
              <i class="fab fa-dribbble"></i>
            </a>
          </button>

          <button type="button" class="footer__social-icons-btn">
            <a
              href="https://medium.com/"
              class="footer__social-link"
              target="_blank"
            >
              <i class="fa-brands medium__icon">𝐌</i>
            </a>
          </button>
        </section>

        <div class="footer__quote">Coded With Love & Passion</div>
      </footer>
    </div>
  </body>
</html>
