<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Television Networks</title>
    <link href="index.css" rel="stylesheet" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <!-- icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>

  <!-- body -->
  <body>
    <!-- background image  -->
    <figure class="imgContainer">
      <img
        class="imgContainer__background-img"
        src="assets/images/background-image.png"
        alt="fancy hats background image"
      />
    </figure>

    <!-- header -->
    <header class="header">
      <nav class="header__menu">
        <!-- menu bar trigger -->
        <i class="fa-solid fa-bars header__menu-trigger"></i>

        <!-- menu items -->
        <ul class="header__menu-items-container">
          <!-- hat icon -->
          <img
            src="assets/images/hat-icon.svg"
            alt="hat icon"
            class="header__menu-item-img"
          />

          <!-- links -->
          <li class="header__menu-item">COWBOY HATS</li>
          <li class="header__menu-item">DAD HATS</li>
          <li class="header__menu-item">FEDORAS</li>
          <li class="header__menu-item">TRIBAL HATS</li>
          <li class="header__menu-item">FLAT CAPS</li>
          <li class="header__menu-item">DERBY HATS</li>
          <li class="header__menu-item">ARMY CAPS</li>
          <li class="header__menu-item">CLOCHE HATS</li>
          <li class="header__menu-item">BEANIES</li>
          <li class="header__menu-item">TRAPPER HATS</li>
          <li class="header__menu-item">SNAPBACKS</li>
          <li class="header__menu-item">TRUCKER HATS</li>
          <li class="header__menu-item">VISORS</li>
        </ul>
      </nav>

      <!-- heading -->
      <h2 class="header__heading">FANCY HATS</h2>

      <!-- year -->
      <h2 class="header__launch-year-since">
        SINCE <span class="header__launch-year">1867</span>
      </h2>
    </header>

    <!-- main -->
    <main class="main">
      <!-- quote -->
      <h1 class="main__quote">
        HATS FOR A
        <br />
        <span class="main__quote-highlight"> LIFETIME </span>
      </h1>
    </main>

    <!-- footer -->
    <footer class="footer">
      <!-- twitter icon -->
      <a href="https://x.com" class="footer__icons" target="_blank">
        <i class="fa-brands fa-twitter"></i>
      </a>

      <!-- facebook item -->
      <a href="https://www.facebook.com" class="footer__icons" target="_blank">
        <i class="fa-brands fa-facebook"></i>
      </a>
    </footer>
  </body>
</html>
